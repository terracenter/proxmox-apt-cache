server:
    # Solo escuchar localmente — uso exclusivo de apt-cacher-ng
    interface: 127.0.0.1
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse

    # Cache DNS
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    msg-cache-size: 16m
    rrset-cache-size: 32m

    do-ip6: no
    verbosity: 1
    logfile: ""
    log-queries: no
    hide-identity: yes
    hide-version: yes

# Reenviar a DNS públicos para resolver nombres de repositorios externos
forward-zone:
    name: "."
    forward-addr: 1.1.1.1
    forward-addr: 8.8.8.8
    forward-addr: 1.0.0.1
    forward-addr: 8.8.4.4
