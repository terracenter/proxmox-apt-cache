# ============================================
# apt-cacher-ng — Configuración
# ============================================

# Directorio donde se almacena el caché
# (mapeado al volumen LVM vía docker-compose)
CacheDir: /var/cache/apt-cacher-ng

# Puerto de escucha
Port: 3142

# Socket interno del daemon (no lo usan los clientes — conectan por TCP :3142)
SocketPath: /tmp/apt-cacher-ng/socket

# Logging
LogDir: /var/log/apt-cacher-ng
Debug: 0

# ============================================
# Repositorios soportados
# ============================================

# Debian
Remap-debrep: file:deb_mirror*.gz /debian ; file:backends_debian

# Ubuntu
Remap-uburep: file:ubuntu_mirrors /ubuntu ; file:backends_ubuntu

# Proxmox
Remap-pvedebrep: file:deb_mirror*.gz /proxmox ; http://download.proxmox.com/debian

# ============================================
# HTTPS — PassThrough
# ============================================
# Permite que repositorios HTTPS pasen a través
# del proxy sin romper SSL. Necesario para:
#   - enterprise.proxmox.com
#   - repos que usan HTTPS
#
# apt-cacher-ng no puede cachear HTTPS, pero
# sí puede hacer pass-through para que los
# clientes no necesiten configuración especial.
PassThroughPattern: .*

# ============================================
# Limpieza del caché
# ============================================

# Tiempo máximo que un paquete no accedido
# permanece en caché (días)
ExThreshold: 30

# ============================================
# Seguridad
# ============================================

# Habilitar la interfaz web de reportes
# Accesible en http://<IP>:3142/acng-report.html
ReportPage: acng-report.html

# No requerir autenticación para reportes
# (el acceso ya está controlado por la red)
# AdminAuth: usuario:contraseña

# ============================================
# Rendimiento
# ============================================

# Conexiones simultáneas máximas por host remoto
MaxConThreads: 4

# Usar conexiones persistentes (keep-alive)
PfilePatternEx: \.asc$

# Cachear archivos volátiles (Release, Packages)
# por un tiempo corto para no servir datos obsoletos
VfilePatternEx: (Release|InRelease|Packages\.xz|Sources\.xz)$
VfileUseRangeOps: 1
